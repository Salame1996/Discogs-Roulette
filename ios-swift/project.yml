name: VinylRoulette
options:
  bundleIdPrefix: com.vinylroulette
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  VinylRoulette:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        type: folder.assetcatalog
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.csalame.vinylroulette
        PRODUCT_NAME: VinylRoulette
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: N7DTB736BF
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Vinyl Roulette
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        DISCOGS_CONSUMER_KEY: $(DISCOGS_CONSUMER_KEY)
        DISCOGS_CONSUMER_SECRET: $(DISCOGS_CONSUMER_SECRET)
        API_PROXY_BASE_URL: $(API_PROXY_BASE_URL)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.vinylroulette.app.oauth
            CFBundleURLSchemes:
              - vinylroulette
